<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meryem - Premium Responsivo</title>

    <style>
        :root {
            --cor-primaria: #0069d9;
            --bg-body: #0a0a0a;
            --bg-card: #161616;
            --texto: #ffffff;
            --gap-grid: 15px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--texto);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(to bottom, #1a1a1a, var(--bg-body));
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--cor-primaria);
        }

        h1 { margin: 10px 0; font-size: 1.8rem; }

        .container {
            padding: 15px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .busca-container {
            position: sticky;
            top: 10px;
            z-index: 100;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid #333;
            background: rgba(20, 20, 20, 0.9);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        input:focus { outline: none; border-color: var(--cor-primaria); }

        .mosaico {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: var(--gap-grid);
        }

        .card {
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s;
            text-decoration: none;
            color: inherit;
            border: 1px solid #222;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .card:hover, .card:focus {
            transform: scale(1.05);
            border-color: var(--cor-primaria);
            z-index: 10;
            outline: none;
        }

        .capa-container {
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #222;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .capa-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-error-text {
            position: absolute;
            padding: 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            z-index: 1;
        }

        .badge-ep {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--cor-primaria);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 2;
        }

        .info {
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 0.9rem;
            background: #1a1a1a;
        }

        .hidden { display: none !important; }

        @media (min-width: 600px) { .mosaico { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .mosaico { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1600px) { .mosaico { grid-template-columns: repeat(7, 1fr); } }
    </style>
</head>

const grid = document.getElementById("grid-episodios");

function renderizar() {
    grid.innerHTML = "";
    links.forEach(link => {
        const match = link.match(/capitulo-(\d+)/);
        if (match) {
            const num = match[1];
            const card = document.createElement("a");
            card.href = link;
            card.target = "_blank";
            card.className = "card";
            card.setAttribute("data-ep", num);

            card.innerHTML = `
                <div class="capa-container">
                    <span class="img-error-text">Meryem<br>Episódio ${num}</span>
                    <img src="${URL_CAPA}" alt="Capa ${num}" onerror="this.style.display='none'">
                    <div class="badge-ep">EP ${num}</div>
                </div>
                <div class="info">ASSISTIR</div>
            `;
            grid.appendChild(card);
        }
    });
}

renderizar();

document.getElementById("busca").addEventListener("input", function() {
    const termo = this.value.trim();
    document.querySelectorAll(".card").forEach(card => {
        const ep = card.getAttribute("data-ep");
        card.classList.toggle("hidden", termo !== "" && !ep.includes(termo));
    });
});
