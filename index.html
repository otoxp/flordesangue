<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendetta (Kan Cicekleri) - Episódios</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #141414;
            --card-bg: #1f1f1f;
            --text: #ffffff;
            --cover: url('https://i.ytimg.com/vi/Jz_8dwNNqnQ/hqdefault.jpg');
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(20,20,20,0.95), rgba(20,20,20,0.7)), var(--cover);
            background-size: cover;
            background-position: center;
            border-bottom: 2px solid #333;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .episode-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .episode-card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .thumb {
            width: 100%;
            padding-top: 56.25%;
            background-image: var(--cover);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .ep-number {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid var(--primary);
        }

        .info {
            padding: 12px;
            text-align: center;
        }

        .info h3 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Estilo para garantir que o link ocupe o card todo */
        .episode-card { cursor: pointer; }

        @media (max-width: 600px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 15px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>VENDETTA</h1>
    <p>Coleção Completa - 299 Episódios</p>
</header>

<div class="container" id="episodeGrid"></div>

<script>
    const grid = document.getElementById('episodeGrid');
    
    // Lista de IDs reais extraídos do seu arquivo para garantir que funcionem
    // Se o ID não estiver aqui, ele usará o padrão da playlist
    const specialIds = {
        1: "Jz_8dwNNqnQ",
        2: "B4X1TSwdO7o",
        3: "r9za5Os2FHI",
        4: "z_7Gqw3asQ4",
        297: "pgJBO8I1B08",
        298: "UmkskLm-BUI",
        299: "Lv4n_hyyAbg"
    };

    for (let i = 1; i <= 299; i++) {
        // Se temos o ID direto, usamos o link simples (mais compatível)
        // Se não, usamos o link da playlist que você forneceu
        let finalLink;
        if (specialIds[i]) {
            finalLink = `https://www.youtube.com/watch?v=${specialIds[i]}`;
        } else {
            finalLink = `https://www.youtube.com/watch?v=Jz_8dwNNqnQ&list=PLtovlg8WE5tThN5rypWMeRwgVLPeerjRa&index=${i}`;
        }

        const card = document.createElement('a');
        card.className = 'episode-card';
        card.href = finalLink;
        card.target = "_blank"; // Abre no app do YouTube ou nova aba
        
        card.innerHTML = `
            <div class="thumb">
                <span class="ep-number">EP ${i}</span>
            </div>
            <div class="info">
                <h3>Capítulo ${i}</h3>
            </div>
        `;
        grid.appendChild(card);
    }
</script>

</body>
</html>
