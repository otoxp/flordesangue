
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deewangi - Série Completa</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: #fff;
}

/* PLAYER */
#player {
    width: 100%;
    height: 50vh;
    border: none;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    background: #1c1c1c;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

/* THUMB */
.thumb {
    width: 100%;
    height: 130px;
    object-fit: cover;
}

/* TITLE */
.title {
    padding: 8px;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<iframe id="player" src="https://www.youtube.com/embed/2X1gs_7WATE" allowfullscreen></iframe>
